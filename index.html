<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guide MU Premium</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0a0a0a;
            color: #fff;
            margin: 0;
            padding: 0;
        }
        header {
            background: #8B0000;
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid #FFD700;
        }
        h1 {
            color: #FFD700;
            margin: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .servidor {
            background: #111;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .servidor img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #FFD700;
            color: #000;
            text-decoration: none;
            border-radius: 5px;
            margin: 5px;
            font-weight: bold;
        }
        .btn-discord {
            background: #5865F2;
            color: #fff;
        }
    </style>
</head>
<body>
    <header>
        <h1>🎮 Guide MU Premium</h1>
    </header>
    <div class="container">
        <h2>Servidores em Destaque</h2>
        
        <div class="servidor">
            <img src="/images/servidores/mu-dragon.jpg" alt="MU Dragon">
            <h3>MU Dragon Season 18</h3>
            <p>Servidor Season 18 com rates 5x, comunidade ativa.</p>
            <p>
                <a href="https://seusite.com" class="btn" target="_blank">🌐 Site Oficial</a>
                <a href="https://discord.gg/convite" class="btn btn-discord" target="_blank">💬 Discord</a>
            </p>
        </div>

        <div class="servidor">
            <img src="/images/servidores/mu-legends.gif" alt="MU Legends">
            <h3>MU Legends Premium</h3>
            <p>Servidor VIP com anti-cheat e eventos exclusivos.</p>
            <p>
                <a href="https://seusite2.com" class="btn" target="_blank">🌐 Site Oficial</a>
                <a href="https://discord.gg/convite2" class="btn btn-discord" target="_blank">💬 Discord</a>
            </p>
        </div>
    </div>
</body>
</html>
